[tools]
go = "1.26.1"
golangci-lint = "2.11.3"
goreleaser = "2.14.3"
pre-commit = "latest"
syft = "latest"

# ========================
# Build Tasks
# ========================

[tasks.build]
description = "Build CLI to bin/germinator"
depends = ["build:clean"]
run = "mkdir -p bin && go build -ldflags=\"-X gitlab.com/amoconst/germinator/internal/version.Version=$(git describe --tags --always --dirty 2>/dev/null || echo dev) -X gitlab.com/amoconst/germinator/internal/version.Commit=$(git rev-parse HEAD 2>/dev/null || echo unknown) -X gitlab.com/amoconst/germinator/internal/version.Date=$(date +%Y-%m-%d)\" -o bin/germinator ."
sources = ["cmd/**/*.go", "internal/**/*.go", "pkg/**/*.go", "main.go"]
outputs = ["bin/germinator"]

[tasks."build:local"]
description = "Build and install germinator locally for testing"
run = [
 {task="build"},
 "cp bin/germinator $HOME/.local/bin"
]

[tasks."build:clean"]
description = "Clean build artifacts"
run = "rm -rf bin/* dist/* coverage.out coverage.html"

# ========================
# Code Quality & Test Tasks
# ========================

[tasks.lint]
description = "Run linting checks"
run = "golangci-lint run"

[tasks."lint:fix"]
description = "Auto-fix linting issues"
run = "golangci-lint run --fix"

[tasks.format]
description = "Format Go code"
run = "gofmt -w ."

[tasks.test]
description = "Run all tests (unit + golden + integration + e2e)"
depends = ["test:unit", "test:golden", "test:integration", "test:e2e"]

[tasks."test:unit"]
description = "Run unit tests only (excludes golden/integration/e2e)"
run = "go test ./..."

[tasks."test:golden"]
description = "Run golden file tests (output verification)"
run = "go test -tags=golden ./..."

[tasks."test:integration"]
description = "Run integration tests (end-to-end pipeline)"
run = "go test -tags=integration ./..."

[tasks."test:e2e"]
description = "Run E2E tests (full CLI workflow)"
run = "go test -tags=e2e ./test/e2e/..."

[tasks."test:coverage"]
description = "Run all tests with coverage"
run = [
    { tasks = [
        "test:coverage:unit",
        "test:coverage:golden",
        "test:coverage:integration",
        "test:coverage:e2e",
    ] },
]

[tasks."test:coverage:unit"]
description = "Run unit tests with coverage"
run = "go test ./... -cover -coverprofile=coverage_unit.out"

[tasks."test:coverage:golden"]
description = "Run golden tests with coverage"
run = "go test -tags=golden ./... -cover -coverprofile=coverage_golden.out"

[tasks."test:coverage:integration"]
description = "Run integration tests with coverage"
run = "go test -tags=integration ./... -cover -coverprofile=coverage_integration.out"

[tasks."test:coverage:e2e"]
description = "Run E2E tests with coverage"
run = "go test -tags=e2e ./test/e2e/... -cover -coverprofile=coverage_e2e.out"

[tasks."test:release"]
description = "Test GoReleaser release flow (build only, no publish)"
run = "goreleaser release --skip=publish --clean"

[tasks.check]
description = "Run all validation checks"
depends = ["lint", "format", "test", "build"]

# ========================
# Release Management
# ========================

[tasks.release]
description = "Validate, update changelog, commit, and tag a release"
usage = '''
arg "<bump_type>" help="Version bump type" {
    choices "patch" "minor" "major"
}
'''
run = "mise run release:prepare ${usage_bump_type} && mise run release:tag ${usage_bump_type}"

# Note: CI Docker image is built automatically by GitLab CI when Dockerfile.ci or .mise/config.toml changes
