schema: spec-driven

context: |
  Domain: Configuration adapter transforming AI coding assistant documents
  (commands, memory, skills, agents) between platforms using canonical YAML
  as source, targeting Claude Code or OpenCode.

  Architecture (current):
  - Three concerns per command: Parse (Cobra) → Execute (run fn) → Respond (output)
  - One file per Cobra command containing: NewXxxCommand + RunE
  - DI via cmd.ServiceContainer passed through the command tree in CommandConfig
    (Transformer, Validator, Canonicalizer, Initializer)
  - Verbosity handled by cmd.VerbosePrint / cmd.VeryVerbosePrint (level 0/1/2)
  - Errors carry semantic meaning only; typed errors from internal/domain;
    exit codes (0/1/2/3/4/5/6) mapped in cmd/error_handler.go

  Key Concepts:
  - PermissionPolicy enum (restrictive, balanced, permissive, analysis, unrestricted)
  - Behavior object (mode, temperature, steps, prompt, hidden, disabled)
  - Targets section for platform-specific overrides
  - User-provided model IDs (no normalization)

  Tech stack: Go 1.25.5, Cobra CLI, YAML (gopkg.in/yaml.v3),
    Templates (github.com/Masterminds/sprig/v3), koanf for config
    (koanf/v2, koanf/providers/file, koanf/parsers/toml/v2),
    Carapace for shell completion (github.com/carapace-sh/carapace),
    Ginkgo v2 + Gomega + gexec for E2E,
    testify for assertions
  Tooling: mise, golangci-lint (with depguard), pre-commit

  Target-only libraries (planned for migration, not yet in go.mod):
    samber/lo (collection helpers), huh (prompts), lipgloss (terminal output),
    log/slog (structured logging)

  Code conventions:
  - NO comments in code unless explicitly requested
  - Table-driven tests with fixtures
  - Use mise run <task> for all task operations
  - Run `mise run check` before committing (see rules.tasks for details)
  - Platform-specific logic in adapter packages only
  - runF injection in command constructor for testability

  Package layout (current):
  - cmd/                          Cobra commands (one file per cmd)
  - internal/application/         Interfaces between cmd and service layers
                                  (interfaces.go, requests.go, results.go)
  - internal/domain/              Domain types, validation, results, pipeline;
                                  typed errors (errors.go, validation.go,
                                  result.go, results.go, agent.go, command.go,
                                  skill.go, memory.go, platform.go)
  - internal/infrastructure/      Adapters, config, library, parsing,
                                  serialization subpackages
  - internal/infrastructure/adapters/   Platform adapters (claude-code/, opencode/)
  - internal/infrastructure/config/     Config loading (koanf, XDG paths)
  - internal/infrastructure/library/    Library I/O (loader, resolver, saver,
                                        validator, refresher, batcher)
  - internal/infrastructure/parsing/    Document loading and parsing
  - internal/infrastructure/serialization/  Document serialization
  - internal/models/              Domain-level constants (platform IDs, etc.)
  - internal/service/             canonicalizer, transformer, initializer,
                                  validator service implementations
  - internal/version/             Version info (Version, Commit, Date)
  - config/templates/             Template files for rendering
  - test/                         Unit, golden, e2e tests and fixtures
                                  (see test/AGENTS.md)

  Target architecture (golang-cli-architecture, mid-migration):
  - See internal/AGENTS.md for the target tree and migration status

  Transformation Pipelines (current):
  Forward: Canonical YAML → parsing.LoadDocument → validation.Validate →
           <platform>.RenderDocument → Write Platform File
  Reverse: Platform File → <platform>.ParsePlatformDocument →
           validation.Validate → canonicalizer.MarshalCanonical →
           Write Canonical YAML

  Architecture patterns:
  - Path inputs are CLI-flag-driven (--input, --output, --library)
  - Template lookup uses config/templates/
  - Library uses a library.yaml-based directory structure
  - Platform differences handled automatically via adapters
  - Preserve source content, only adapt for target compatibility
  - No forced compatibility - omit unsupported features gracefully

  Research documentation (openspec/research/):
  - Purpose: Factual reference for platform-specific features
  - Usage: Consult when building/adapting platform adapters or validating configurations
  - Notes: Documents are concise overviews, not implementation guidance

  Spec organization (project-specific, overrides osx-concepts defaults):
  - Layout: openspec/specs/<category>-<spec-name>/spec.md. Categories are
    encoded as a name prefix (cli-, core-, library-, models-,
    transformation-, validation-, application-, errors-, infrastructure-,
    testing-) and grouped in openspec/specs/AGENTS.md.
  - Source of truth: openspec/specs/AGENTS.md. Consult it before creating,
    syncing, or moving a spec to pick the correct category prefix.
  - All specs MUST live one folder deep under openspec/specs/. Files
    directly at openspec/specs/ are not permitted, and category
    subdirectories are not used — the category is a name prefix only.
  - This flat layout matches what the OpenSpec CLI reads natively.

rules:
  proposal:
    - Include the sections Why, What Changes, Capabilities, Impact
    - Document breaking changes explicitly when applicable
    - List all affected files organized by category
    - Include Risks section with mitigations for significant changes
    - Keep scope focused and well-defined

  specs:
    - Use explicit SHALL statements in requirements
    - Each scenario follows Given/When/Then/AND format
    - Scenarios are concrete with specific inputs and expected outputs
    - Include both positive and negative scenarios
    - Requirements are grouped logically with clear purpose statements
    - Scenarios are testable and verify specific behaviors
    - All specs MUST live at openspec/specs/<category>-<spec-name>/spec.md
      (one folder deep; no files directly under openspec/specs/, no
      category subdirectories); see openspec/specs/AGENTS.md

  design:
    - Include Context (current state, constraints, assumptions)
    - Goals state what will be achieved; Non-Goals state what is out of scope
    - Decisions are numbered with Choice, Rationale, Alternatives considered
    - Include Risks/Trade-offs section with specific mitigations
    - Reference related specs, proposals, or design decisions
    - Document constraints explicitly

  tasks:
    - Group into logical sections (Setup, Implementation, Testing, Verification, Documentation)
    - Use checkbox format for items
    - Tasks are small, clear, and independently verifiable
    - Include specific file paths and function/method names where applicable
    - Add verification steps via `mise run check, lint, test, test:coverage`
    - Mark completed items with [x]
    - Tasks are ordered logically with dependencies clear

  testing:
    - 70% or higher coverage for all packages
    - Prioritize improving coverage in cmd/ and adapters/

testing:
  - Testing pyramid: Core (most, no mocks) → Command (runF injection + iostreams.Test()) → Integration → E2E
  - The test/mocks/ package is deprecated; new tests use runF injection with iostreams.Test()
  - Golden file tests (test/golden/) with UPDATE_GOLDEN flag
  - Fixtures in test/fixtures/ for both platforms
  - Table-driven tests with descriptive names and errorCount for validation
  - Platform testing: both claude-code and opencode REQUIRED for platform-specific tests
